<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Follow John Kirshy</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #0f0f1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
    padding: 24px 16px;
  }

  .card {
    background: #1a1a2e;
    border: 1px solid #2a2a4a;
    border-radius: 20px;
    padding: 40px 32px;
    max-width: 420px;
    width: 100%;
    text-align: center;
  }

  .avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    background: linear-gradient(135deg, #3b82d4, #7c3aed);
    margin: 0 auto 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
    font-weight: 700;
    color: white;
  }

  h1 {
    color: #ffffff;
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 6px;
  }

  .tagline {
    color: #8888aa;
    font-size: 14px;
    margin-bottom: 8px;
  }

  .niche {
    display: inline-block;
    background: #3b82d4;
    color: white;
    font-size: 12px;
    font-weight: 600;
    padding: 4px 12px;
    border-radius: 20px;
    margin-bottom: 32px;
  }

  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    width: 100%;
    padding: 16px 20px;
    border-radius: 12px;
    text-decoration: none;
    font-size: 16px;
    font-weight: 600;
    margin-bottom: 14px;
    transition: opacity 0.15s;
    border: none;
    cursor: pointer;
  }

  .btn:hover { opacity: 0.88; }

  .btn-facebook {
    background: #1877f2;
    color: white;
  }

  .btn-instagram {
    background: linear-gradient(135deg, #f58529, #dd2a7b, #8134af, #515bd4);
    color: white;
  }

  .btn-youtube {
    background: #ff0000;
    color: white;
  }

  .btn-icon {
    width: 28px;
    height: 28px;
    flex-shrink: 0;
  }

  .btn-label { flex: 1; text-align: center; }

  .divider {
    border: none;
    border-top: 1px solid #2a2a4a;
    margin: 24px 0;
  }

  .footer-text {
    color: #555577;
    font-size: 12px;
    line-height: 1.6;
  }

  .footer-text strong {
    color: #8888aa;
  }
</style>
</head>

</body>
</html>
