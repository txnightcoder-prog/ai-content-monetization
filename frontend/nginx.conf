server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Vite hashes JS/CSS filenames on every build (e.g. index-CEnPkrBZ.js)
    # so long-cache on those is safe.  index.html itself must NEVER be cached
    # so the browser always fetches the latest entry-point with fresh hashes.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html — no cache so the browser always gets the latest hashes
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        try_files $uri /index.html;
    }

    # All other requests fall back to index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
