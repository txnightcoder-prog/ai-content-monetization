server {
    listen 3000;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy all /api/* requests to the Azure backend container
    location /api/ {
        proxy_pass https://ai-content-backend.victoriousmeadow-edd1d4e3.eastus.azurecontainerapps.io/api/;
        proxy_http_version 1.1;
        proxy_set_header Host ai-content-backend.victoriousmeadow-edd1d4e3.eastus.azurecontainerapps.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_ssl_server_name on;
        proxy_read_timeout 120s;
    }

    # Vite hashes JS/CSS filenames on every build (e.g. index-CEnPkrBZ.js)
    # so long-cache on those is safe.  index.html itself must NEVER be cached
    # so the browser always fetches the latest entry-point with fresh hashes.
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html — no cache so the browser always gets the latest hashes
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Pragma "no-cache";
        try_files $uri /index.html;
    }

    # All other requests fall back to index.html (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
    }
}
