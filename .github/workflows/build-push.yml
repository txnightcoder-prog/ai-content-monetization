name: Build, Push and Deploy to Azure

# Trigger on every push to main, or manually from the Actions tab
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER:    txnightcoderregistry.azurecr.io
  BACKEND_IMAGE:       txnightcoderregistry.azurecr.io/backend
  FRONTEND_IMAGE:      txnightcoderregistry.azurecr.io/frontend
  VITE_API_URL:        https://ai-content-backend.victoriousmeadow-edd1d4e3.eastus.azurecontainerapps.io
  RESOURCE_GROUP:      ai-video-pipeline
  BACKEND_APP_NAME:    ai-content-backend
  FRONTEND_APP_NAME:   ai-content-frontend

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      # ── 2. Log in to ACR ────────────────────────────────────────────────────
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ── 3. Build & push backend ──────────────────────────────────────────────
      - name: Build and push backend image
        uses: docker/build-push-action@v6.10.0
        with:
          context:    ./backend
          file:       ./backend/Dockerfile
          push:       true
          tags:       ${{ env.BACKEND_IMAGE }}:latest,${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      # ── 4. Build & push frontend ─────────────────────────────────────────────
      - name: Build and push frontend image
        uses: docker/build-push-action@v6.10.0
        with:
          context:    ./frontend
          file:       ./frontend/Dockerfile
          push:       true
          tags:       ${{ env.FRONTEND_IMAGE }}:latest,${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: VITE_API_URL=${{ env.VITE_API_URL }}

      # ── 5. Log in to Azure (for container app updates) ───────────────────────
      - name: Log in to Azure
        uses: azure/login@v2.3.0
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      # ── 6. Deploy backend — update image then set only non-empty secrets ───────
      # Only variables that have a value in GitHub Secrets are written to Azure.
      # Empty secrets are skipped so they don't overwrite keys set via PowerShell.
      - name: Deploy backend image
        run: |
          az containerapp update \
            --name ${{ env.BACKEND_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Set backend environment variables
        env:
          DATABASE_URL:                ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY:              ${{ secrets.OPENAI_API_KEY }}
          ELEVENLABS_API_KEY:          ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID:         ${{ secrets.ELEVENLABS_VOICE_ID }}
          PEXELS_API_KEY:              ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_DATA_API_KEY:        ${{ secrets.YOUTUBE_DATA_API_KEY }}
          YOUTUBE_CLIENT_ID:           ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:       ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:       ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          BUFFER_ACCESS_TOKEN:         ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_YOUTUBE_PROFILE_ID:   ${{ secrets.BUFFER_YOUTUBE_PROFILE_ID }}
          BUFFER_TIKTOK_PROFILE_ID:    ${{ secrets.BUFFER_TIKTOK_PROFILE_ID }}
          BUFFER_INSTAGRAM_PROFILE_ID: ${{ secrets.BUFFER_INSTAGRAM_PROFILE_ID }}
          BUFFER_FACEBOOK_PROFILE_ID:  ${{ secrets.BUFFER_FACEBOOK_PROFILE_ID }}
          TIKTOK_ACCESS_TOKEN:         ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          TIKTOK_CLIENT_KEY:           ${{ secrets.TIKTOK_CLIENT_KEY }}
          TIKTOK_CLIENT_SECRET:        ${{ secrets.TIKTOK_CLIENT_SECRET }}
          TIKTOK_REFRESH_TOKEN:        ${{ secrets.TIKTOK_REFRESH_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN:      ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          GOOGLE_API_KEY:              ${{ secrets.GOOGLE_API_KEY }}
          GEMINI_MODEL:                ${{ secrets.GEMINI_MODEL }}
          FAL_API_KEY:                 ${{ secrets.FAL_API_KEY }}
          PIXABAY_API_KEY:             ${{ secrets.PIXABAY_API_KEY }}
          GUMROAD_WEBHOOK_SECRET:      ${{ secrets.GUMROAD_WEBHOOK_SECRET }}
          SENDGRID_API_KEY:            ${{ secrets.SENDGRID_API_KEY }}
          MAILGUN_API_KEY:             ${{ secrets.MAILGUN_API_KEY }}
          MAILGUN_DOMAIN:              ${{ secrets.MAILGUN_DOMAIN }}
          EMAIL_FROM:                  ${{ secrets.EMAIL_FROM }}
          EMAIL_FROM_NAME:             ${{ secrets.EMAIL_FROM_NAME }}
          SMTP_HOST:                   ${{ secrets.SMTP_HOST }}
          SMTP_PORT:                   ${{ secrets.SMTP_PORT }}
          SMTP_USER:                   ${{ secrets.SMTP_USER }}
          SMTP_PASSWORD:               ${{ secrets.SMTP_PASSWORD }}
          AWS_S3_BUCKET:               ${{ secrets.AWS_S3_BUCKET }}
          AWS_REGION:                  ${{ secrets.AWS_REGION }}
          AZURE_STORAGE_CONNECTION_STRING: ${{ secrets.AZURE_STORAGE_CONNECTION_STRING }}
          AZURE_STORAGE_CONTAINER:     ${{ secrets.AZURE_STORAGE_CONTAINER }}
        run: |
          VARS="VIDEO_OUTPUT_DIR=/tmp/videos"
          VARS="$VARS ALLOWED_ORIGINS=https://ai-content-frontend.victoriousmeadow-edd1d4e3.eastus.azurecontainerapps.io"
          [ -n "$DATABASE_URL" ]                && VARS="$VARS DATABASE_URL=$DATABASE_URL"
          [ -n "$OPENAI_API_KEY" ]              && VARS="$VARS OPENAI_API_KEY=$OPENAI_API_KEY"
          [ -n "$ELEVENLABS_API_KEY" ]          && VARS="$VARS ELEVENLABS_API_KEY=$ELEVENLABS_API_KEY"
          [ -n "$ELEVENLABS_VOICE_ID" ]         && VARS="$VARS ELEVENLABS_VOICE_ID=$ELEVENLABS_VOICE_ID"
          [ -n "$PEXELS_API_KEY" ]              && VARS="$VARS PEXELS_API_KEY=$PEXELS_API_KEY"
          [ -n "$YOUTUBE_DATA_API_KEY" ]        && VARS="$VARS YOUTUBE_DATA_API_KEY=$YOUTUBE_DATA_API_KEY"
          [ -n "$YOUTUBE_CLIENT_ID" ]           && VARS="$VARS YOUTUBE_CLIENT_ID=$YOUTUBE_CLIENT_ID"
          [ -n "$YOUTUBE_CLIENT_SECRET" ]       && VARS="$VARS YOUTUBE_CLIENT_SECRET=$YOUTUBE_CLIENT_SECRET"
          [ -n "$YOUTUBE_REFRESH_TOKEN" ]       && VARS="$VARS YOUTUBE_REFRESH_TOKEN=$YOUTUBE_REFRESH_TOKEN"
          [ -n "$BUFFER_ACCESS_TOKEN" ]         && VARS="$VARS BUFFER_ACCESS_TOKEN=$BUFFER_ACCESS_TOKEN"
          [ -n "$BUFFER_YOUTUBE_PROFILE_ID" ]   && VARS="$VARS BUFFER_YOUTUBE_PROFILE_ID=$BUFFER_YOUTUBE_PROFILE_ID"
          [ -n "$BUFFER_TIKTOK_PROFILE_ID" ]    && VARS="$VARS BUFFER_TIKTOK_PROFILE_ID=$BUFFER_TIKTOK_PROFILE_ID"
          [ -n "$BUFFER_INSTAGRAM_PROFILE_ID" ] && VARS="$VARS BUFFER_INSTAGRAM_PROFILE_ID=$BUFFER_INSTAGRAM_PROFILE_ID"
          [ -n "$BUFFER_FACEBOOK_PROFILE_ID" ]  && VARS="$VARS BUFFER_FACEBOOK_PROFILE_ID=$BUFFER_FACEBOOK_PROFILE_ID"
          [ -n "$TIKTOK_ACCESS_TOKEN" ]         && VARS="$VARS TIKTOK_ACCESS_TOKEN=$TIKTOK_ACCESS_TOKEN"
          [ -n "$TIKTOK_CLIENT_KEY" ]           && VARS="$VARS TIKTOK_CLIENT_KEY=$TIKTOK_CLIENT_KEY"
          [ -n "$TIKTOK_CLIENT_SECRET" ]        && VARS="$VARS TIKTOK_CLIENT_SECRET=$TIKTOK_CLIENT_SECRET"
          [ -n "$TIKTOK_REFRESH_TOKEN" ]        && VARS="$VARS TIKTOK_REFRESH_TOKEN=$TIKTOK_REFRESH_TOKEN"
          [ -n "$INSTAGRAM_ACCESS_TOKEN" ]      && VARS="$VARS INSTAGRAM_ACCESS_TOKEN=$INSTAGRAM_ACCESS_TOKEN"
          [ -n "$GOOGLE_API_KEY" ]              && VARS="$VARS GOOGLE_API_KEY=$GOOGLE_API_KEY"
          [ -n "$GEMINI_MODEL" ]                && VARS="$VARS GEMINI_MODEL=$GEMINI_MODEL"
          [ -n "$FAL_API_KEY" ]                 && VARS="$VARS FAL_API_KEY=$FAL_API_KEY"
          [ -n "$PIXABAY_API_KEY" ]             && VARS="$VARS PIXABAY_API_KEY=$PIXABAY_API_KEY"
          [ -n "$GUMROAD_WEBHOOK_SECRET" ]      && VARS="$VARS GUMROAD_WEBHOOK_SECRET=$GUMROAD_WEBHOOK_SECRET"
          [ -n "$SENDGRID_API_KEY" ]            && VARS="$VARS SENDGRID_API_KEY=$SENDGRID_API_KEY"
          [ -n "$MAILGUN_API_KEY" ]             && VARS="$VARS MAILGUN_API_KEY=$MAILGUN_API_KEY"
          [ -n "$MAILGUN_DOMAIN" ]              && VARS="$VARS MAILGUN_DOMAIN=$MAILGUN_DOMAIN"
          [ -n "$EMAIL_FROM" ]                  && VARS="$VARS EMAIL_FROM=$EMAIL_FROM"
          [ -n "$EMAIL_FROM_NAME" ]             && VARS="$VARS EMAIL_FROM_NAME=$EMAIL_FROM_NAME"
          [ -n "$SMTP_HOST" ]                   && VARS="$VARS SMTP_HOST=$SMTP_HOST"
          [ -n "$SMTP_PORT" ]                   && VARS="$VARS SMTP_PORT=$SMTP_PORT"
          [ -n "$SMTP_USER" ]                   && VARS="$VARS SMTP_USER=$SMTP_USER"
          [ -n "$SMTP_PASSWORD" ]               && VARS="$VARS SMTP_PASSWORD=$SMTP_PASSWORD"
          [ -n "$AWS_S3_BUCKET" ]               && VARS="$VARS AWS_S3_BUCKET=$AWS_S3_BUCKET"
          [ -n "$AWS_REGION" ]                  && VARS="$VARS AWS_REGION=$AWS_REGION"
          [ -n "$AZURE_STORAGE_CONNECTION_STRING" ] && VARS="$VARS AZURE_STORAGE_CONNECTION_STRING=$AZURE_STORAGE_CONNECTION_STRING"
          [ -n "$AZURE_STORAGE_CONTAINER" ]     && VARS="$VARS AZURE_STORAGE_CONTAINER=$AZURE_STORAGE_CONTAINER"
          az containerapp update \
            --name ${{ env.BACKEND_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --set-env-vars $VARS

      # ── 7. Deploy frontend Container App ─────────────────────────────────────
      - name: Deploy frontend
        run: |
          az containerapp update \
            --name ${{ env.FRONTEND_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            --min-replicas 1

      # ── 8. Health-check — wait for new revision to serve ─────────────────────
      - name: Verify frontend is live
        run: |
          FRONTEND_URL="https://ai-content-frontend.victoriousmeadow-edd1d4e3.eastus.azurecontainerapps.io"
          echo "Waiting for new image to be served..."
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$FRONTEND_URL")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Frontend is live!"
              break
            fi
            sleep 10
          done

      - name: Verify backend is live
        run: |
          BACKEND_URL="https://ai-content-backend.victoriousmeadow-edd1d4e3.eastus.azurecontainerapps.io"
          for i in $(seq 1 12); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$BACKEND_URL/health")
            echo "Attempt $i: HTTP $STATUS"
            if [ "$STATUS" = "200" ]; then
              echo "Backend is live!"
              break
            fi
            sleep 10
          done

      # ── 9. Summary ───────────────────────────────────────────────────────────
      - name: Print deployed image URLs
        run: |
          echo "Backend : ${{ env.BACKEND_IMAGE }}:${{ github.sha }}"
          echo "Frontend: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}"
          echo "Deployed to resource group: ${{ env.RESOURCE_GROUP }}"
          echo "Frontend: https://ai-content-frontend.victoriousmeadow-edd1d4e3.eastus.azurecontainerapps.io"
          echo "Backend : https://ai-content-backend.victoriousmeadow-edd1d4e3.eastus.azurecontainerapps.io/docs"
