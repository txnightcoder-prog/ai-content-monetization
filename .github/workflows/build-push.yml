name: Build, Push and Deploy to Azure

# Trigger on every push to main, or manually from the Actions tab
on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ACR_LOGIN_SERVER:    txnightcoderregistry.azurecr.io
  BACKEND_IMAGE:       txnightcoderregistry.azurecr.io/backend
  FRONTEND_IMAGE:      txnightcoderregistry.azurecr.io/frontend
  VITE_API_URL:        https://ai-content-backend.victoriousmeadow-edd1d4e3.eastus.azurecontainerapps.io
  RESOURCE_GROUP:      ai-video-pipeline
  BACKEND_APP_NAME:    ai-content-backend
  FRONTEND_APP_NAME:   ai-content-frontend

jobs:
  build-and-deploy:
    name: Build, Push & Deploy
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout source ───────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      # ── 2. Log in to ACR ────────────────────────────────────────────────────
      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3.3.0
        with:
          registry: ${{ env.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ── 3. Build & push backend ──────────────────────────────────────────────
      - name: Build and push backend image
        uses: docker/build-push-action@v6.10.0
        with:
          context:    ./backend
          file:       ./backend/Dockerfile
          push:       true
          tags:       ${{ env.BACKEND_IMAGE }}:latest,${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      # ── 4. Build & push frontend ─────────────────────────────────────────────
      - name: Build and push frontend image
        uses: docker/build-push-action@v6.10.0
        with:
          context:    ./frontend
          file:       ./frontend/Dockerfile
          push:       true
          tags:       ${{ env.FRONTEND_IMAGE }}:latest,${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          build-args: VITE_API_URL=${{ env.VITE_API_URL }}

      # ── 5. Log in to Azure (for container app updates) ───────────────────────
      - name: Log in to Azure
        uses: azure/login@v2.3.0
        with:
          creds: '{"clientId":"${{ secrets.AZURE_CLIENT_ID }}","clientSecret":"${{ secrets.AZURE_CLIENT_SECRET }}","tenantId":"${{ secrets.AZURE_TENANT_ID }}","subscriptionId":"${{ secrets.AZURE_SUBSCRIPTION_ID }}"}'

      # ── 6. Deploy backend Container App — update image + all env vars ─────────
      # Secrets live in GitHub repo → Settings → Secrets and variables → Actions.
      # To add a new API key: add the secret in GitHub, then add a line below.
      # Values are passed at deploy time — the container image itself has no secrets baked in.
      - name: Deploy backend
        env:
          DATABASE_URL:                ${{ secrets.DATABASE_URL }}
          OPENAI_API_KEY:              ${{ secrets.OPENAI_API_KEY }}
          CREATIFY_API_ID:             ${{ secrets.CREATIFY_API_ID }}
          CREATIFY_API_KEY:            ${{ secrets.CREATIFY_API_KEY }}
          ELEVENLABS_API_KEY:          ${{ secrets.ELEVENLABS_API_KEY }}
          ELEVENLABS_VOICE_ID:         ${{ secrets.ELEVENLABS_VOICE_ID }}
          PEXELS_API_KEY:              ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_DATA_API_KEY:        ${{ secrets.YOUTUBE_DATA_API_KEY }}
          YOUTUBE_CLIENT_ID:           ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET:       ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN:       ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
          BUFFER_ACCESS_TOKEN:         ${{ secrets.BUFFER_ACCESS_TOKEN }}
          BUFFER_YOUTUBE_PROFILE_ID:   ${{ secrets.BUFFER_YOUTUBE_PROFILE_ID }}
          BUFFER_TIKTOK_PROFILE_ID:    ${{ secrets.BUFFER_TIKTOK_PROFILE_ID }}
          BUFFER_INSTAGRAM_PROFILE_ID: ${{ secrets.BUFFER_INSTAGRAM_PROFILE_ID }}
          BUFFER_FACEBOOK_PROFILE_ID:  ${{ secrets.BUFFER_FACEBOOK_PROFILE_ID }}
          TIKTOK_ACCESS_TOKEN:         ${{ secrets.TIKTOK_ACCESS_TOKEN }}
          INSTAGRAM_ACCESS_TOKEN:      ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          GOOGLE_API_KEY:              ${{ secrets.GOOGLE_API_KEY }}
        run: |
          az containerapp update \
            --name ${{ env.BACKEND_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            --set-env-vars \
              "DATABASE_URL=${DATABASE_URL}" \
              "OPENAI_API_KEY=${OPENAI_API_KEY}" \
              "CREATIFY_API_ID=${CREATIFY_API_ID}" \
              "CREATIFY_API_KEY=${CREATIFY_API_KEY}" \
              "ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY}" \
              "ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID}" \
              "PEXELS_API_KEY=${PEXELS_API_KEY}" \
              "YOUTUBE_DATA_API_KEY=${YOUTUBE_DATA_API_KEY}" \
              "YOUTUBE_CLIENT_ID=${YOUTUBE_CLIENT_ID}" \
              "YOUTUBE_CLIENT_SECRET=${YOUTUBE_CLIENT_SECRET}" \
              "YOUTUBE_REFRESH_TOKEN=${YOUTUBE_REFRESH_TOKEN}" \
              "BUFFER_ACCESS_TOKEN=${BUFFER_ACCESS_TOKEN}" \
              "BUFFER_YOUTUBE_PROFILE_ID=${BUFFER_YOUTUBE_PROFILE_ID}" \
              "BUFFER_TIKTOK_PROFILE_ID=${BUFFER_TIKTOK_PROFILE_ID}" \
              "BUFFER_INSTAGRAM_PROFILE_ID=${BUFFER_INSTAGRAM_PROFILE_ID}" \
              "BUFFER_FACEBOOK_PROFILE_ID=${BUFFER_FACEBOOK_PROFILE_ID}" \
              "TIKTOK_ACCESS_TOKEN=${TIKTOK_ACCESS_TOKEN}" \
              "INSTAGRAM_ACCESS_TOKEN=${INSTAGRAM_ACCESS_TOKEN}" \
              "GOOGLE_API_KEY=${GOOGLE_API_KEY}" \
              "VIDEO_OUTPUT_DIR=/tmp/videos" \
              "ALLOWED_ORIGINS=https://ai-content-frontend.victoriousmeadow-edd1d4e3.eastus.azurecontainerapps.io"

      # ── 7. Deploy frontend Container App ─────────────────────────────────────
      - name: Deploy frontend
        run: |
          az containerapp update \
            --name ${{ env.FRONTEND_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

      # ── 8. Summary ───────────────────────────────────────────────────────────
      - name: Print deployed image URLs
        run: |
          echo "Backend : ${{ env.BACKEND_IMAGE }}:${{ github.sha }}"
          echo "Frontend: ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}"
          echo "Deployed to resource group: ${{ env.RESOURCE_GROUP }}"
